<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFF8F0">
<title>Bookburrow Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0; --card:#FEF3E2; --ink:#3D5A80; --muted:#8B7E74;
    --green:#7D9B76; --gold:#D4A76A; --terra:#C2705B; --line:#E8DFD5;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:Nunito,system-ui,sans-serif; background:var(--bg); color:var(--ink);
    min-height:100vh; padding:18px 16px calc(28px + env(safe-area-inset-bottom));
    max-width:560px; margin:0 auto;
  }
  header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .logo{font-size:30px;line-height:1}
  h1{font-size:20px;margin:0;font-weight:800}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 16px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:4px 10px;border-radius:20px;background:var(--card);color:var(--muted)}
  .pill.ok{color:var(--green)} .pill.bad{color:var(--terra)}
  .btn{font-family:inherit;font-weight:700;font-size:15px;border:none;border-radius:12px;
    padding:13px 18px;cursor:pointer;transition:transform .05s ease, filter .15s ease}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--green);color:#fff}
  .btn-secondary{background:var(--card);color:var(--ink);border:2px solid var(--line)}
  .btn.block{display:block;width:100%}
  .row{display:flex;gap:8px;margin:12px 0}
  .row input{flex:1;font-family:inherit;font-size:15px;padding:12px;border:2px solid var(--line);
    border-radius:12px;background:#fff;color:var(--ink)}
  .row input:focus{outline:none;border-color:var(--gold)}
  #stage{position:relative;border-radius:16px;overflow:hidden;background:#000;display:none;margin:12px 0}
  #stage.live{display:block}
  video{width:100%;display:block;max-height:60vh;object-fit:cover}
  .frame{position:absolute;inset:14% 10%;border:2px solid rgba(255,255,255,.85);border-radius:14px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.18)}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  .flash.on{animation:flash .35s ease}
  @keyframes flash{0%{opacity:.7}100%{opacity:0}}
  .count{font-weight:800;font-size:15px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .count .n{background:var(--green);color:#fff;border-radius:20px;padding:2px 11px;font-size:13px}
  ul#list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li.item{display:flex;gap:12px;align-items:center;background:var(--card);border-radius:12px;padding:10px 12px}
  li.item img,li.item .ph{width:38px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--line);
    display:flex;align-items:center;justify-content:center;font-size:20px}
  li.item .t{font-weight:700;font-size:14px;line-height:1.25}
  li.item .a{color:var(--muted);font-size:12px}
  li.item .tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--green);white-space:nowrap}
  li.item .tag.warn{color:var(--gold)}
  li.card{display:flex;flex-direction:column;gap:8px;background:var(--card);border-radius:12px;padding:12px}
  li.card .chead{display:flex;gap:12px;align-items:center}
  li.card img,li.card .ph{width:38px;height:54px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:20px}
  li.card .isbn{color:var(--muted);font-size:12px;margin-top:2px}
  li.card .tag{font-size:11px;font-weight:700;color:var(--green)}
  li.card .tag.warn{color:var(--gold)}
  li.card label{display:flex;flex-direction:column;font-size:11px;font-weight:700;color:var(--muted);gap:3px}
  li.card input,li.card textarea{font-family:inherit;font-size:14px;font-weight:400;color:var(--ink);padding:8px 10px;border:2px solid var(--line);border-radius:9px;background:#fff;width:100%;box-sizing:border-box}
  li.card input:focus,li.card textarea:focus{outline:none;border-color:var(--gold)}
  li.card textarea{resize:vertical}
  li.card .two{display:flex;gap:8px}
  li.card .two label{flex:1;min-width:0}
  .note{margin-top:22px;background:var(--card);border-radius:12px;padding:14px;font-size:13px;color:var(--muted);line-height:1.45}
  .note b{color:var(--ink)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:14px;font-weight:700;
    opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center;z-index:9}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <header><div class="logo">🐉</div><div><h1>Bookburrow Scanner</h1></div></header>
  <div class="sub">Scan books straight to your shelf. <span id="cloud" class="pill">connecting…</span></div>

  <button id="camBtn" class="btn btn-primary block">📷 Start camera</button>

  <div id="stage">
    <video id="video" playsinline muted></video>
    <div class="frame"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="row">
    <input id="manual" type="text" inputmode="numeric" autocomplete="off" placeholder="Or type an ISBN (e.g. 9780547928227)">
    <button class="btn btn-secondary" onclick="addManual()">Add</button>
  </div>

  <div class="count">Saved this session <span class="n" id="count">0</span></div>
  <ul id="list"></ul>

  <div class="note">📚 These books save to your shared Bookburrow cloud shelf. To pull them into your library, open <b>Bookburrow → Scan Books → ☁️ Import scans</b>. No login needed — just keep scanning.</div>

  <div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Config — same Supabase project + anon key as the main app ───────────────
  const SUPABASE_URL = 'https://fxbgghqjibtjyadjpmvk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_Ucgg6fNLLzvWd6RWKtoSOg_jcsncFqs';
  // Keep in sync with bookburrow-books-table.sql and Bookburrow.html's BOOKS_COLUMN_MAP.
  const BOOKS_COLUMN_MAP = {
    isbn:'isbn', title:'title', author:'author', publisher:'publisher',
    published_date:'published_date', cover_url:'cover_url', description:'description',
    page_count:'page_count', genre:'genre', language:'language'
  };

  let client = null;
  try { client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}
  const cloudPill = document.getElementById('cloud');
  if (client) { cloudPill.textContent = '☁️ cloud ready'; cloudPill.className = 'pill ok'; }
  else { cloudPill.textContent = '⚠️ cloud unavailable'; cloudPill.className = 'pill bad'; }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function isbn13(raw){
    let s = (raw||'').toString().replace(/[^0-9xX]/g,'').toUpperCase();
    if (s.length === 13) return s;
    if (s.length === 10){
      const core = '978' + s.slice(0,9); let sum = 0;
      for (let i=0;i<12;i++) sum += (i%2?3:1)*parseInt(core[i],10);
      return core + ((10 - (sum%10))%10);
    }
    return s;
  }
  let toastTimer;
  function toast(msg){
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 1900);
  }
  function buzz(){ try{ navigator.vibrate && navigator.vibrate(55); }catch(e){}
    const f = document.getElementById('flash'); f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); }

  // Full book metadata: Google Books (country param) first, then Open Library
  // edition + work record (description / subjects / cover) to fill any gaps.
  async function lookup(isbn){
    const m = { isbn, title:'', author:'', publisher:'', published_date:'', cover_url:'', description:'', page_count:0, genre:'', language:'' };
    try{
      const gj = await (await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&country=US`)).json();
      const vi = gj && gj.items && gj.items[0] && gj.items[0].volumeInfo;
      if (vi){
        m.title = vi.title || '';
        if (vi.subtitle) m.title = m.title ? (m.title + ': ' + vi.subtitle) : vi.subtitle;
        m.author = (vi.authors && vi.authors.join(', ')) || '';
        m.publisher = vi.publisher || '';
        m.published_date = vi.publishedDate || '';
        m.description = vi.description || '';
        m.page_count = vi.pageCount || 0;
        m.genre = (vi.categories && vi.categories[0]) || '';
        m.language = vi.language || '';
        if (vi.imageLinks){ const c = vi.imageLinks.thumbnail || vi.imageLinks.smallThumbnail || ''; m.cover_url = c.replace(/^http:/,'https:').replace(/&edge=curl/,''); }
      }
    }catch(e){}
    if (!m.title || !m.author || !m.page_count || !m.description || !m.genre || !m.publisher){
      try{
        const d = await (await fetch(`https://openlibrary.org/isbn/${isbn}.json`)).json();
        if (d && typeof d === 'object'){
          if (!m.title) m.title = d.title || '';
          if (!m.page_count) m.page_count = d.number_of_pages || 0;
          if (!m.publisher) m.publisher = (d.publishers && d.publishers[0]) || '';
          if (!m.published_date) m.published_date = d.publish_date || '';
          if (!m.description && d.description) m.description = typeof d.description === 'string' ? d.description : (d.description.value || '');
          if (!m.author && d.authors && d.authors[0] && d.authors[0].key){ try{ const a = await (await fetch(`https://openlibrary.org${d.authors[0].key}.json`)).json(); m.author = a.name || ''; }catch(e){} }
          if ((!m.description || !m.genre) && d.works && d.works[0] && d.works[0].key){
            try{ const w = await (await fetch(`https://openlibrary.org${d.works[0].key}.json`)).json();
              if (!m.description && w.description) m.description = typeof w.description === 'string' ? w.description : (w.description.value || '');
              if (!m.genre && w.subjects && w.subjects[0]) m.genre = w.subjects[0];
            }catch(e){}
          }
        }
      }catch(e){}
    }
    if (!m.cover_url) m.cover_url = `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg?default=false`;
    if (m.language === 'en') m.language = 'English';
    return m;
  }

  async function saveRow(book){
    if (!client) return false;
    const row = {};
    for (const k in BOOKS_COLUMN_MAP){ const v = book[k]; row[BOOKS_COLUMN_MAP[k]] = (v!=null && v!=='') ? v : null; }
    try{ const { error } = await client.from('books').upsert(row, { onConflict:'isbn' }); return !error; }
    catch(e){ return false; }
  }

  // ── Session state + de-dupe ──────────────────────────────────────────────────
  const saved = new Set();          // ISBNs saved this session (UI de-dupe)
  const recent = new Map();         // ISBN -> timestamp (ignore rapid repeats)
  let count = 0;

  // Each scan becomes an editable card: fields are pre-filled, tweak anything, then Save re-upserts.
  let _cardSeq = 0; const _cards = {};
  function addCard(book, ok){
    const id = ++_cardSeq; _cards[id] = Object.assign({}, book);
    const li = document.createElement('li'); li.className = 'card';
    const cover = book.cover_url ? `<img src="${esc(book.cover_url)}" alt="" onerror="this.onerror=null;this.style.display='none'">` : `<div class="ph">📖</div>`;
    li.innerHTML = `
      <div class="chead">${cover}
        <div style="flex:1;min-width:0;">
          <span class="tag${ok ? '' : ' warn'}" id="tag${id}">${ok ? 'Saved ✓' : 'Save failed'}</span>
          <div class="isbn">ISBN ${esc(book.isbn)}</div>
        </div>
      </div>
      <label>Title<input id="f_title_${id}" value="${esc(book.title)}"></label>
      <label>Author<input id="f_author_${id}" value="${esc(book.author)}"></label>
      <div class="two">
        <label>Pages<input id="f_pages_${id}" type="number" inputmode="numeric" value="${book.page_count || ''}"></label>
        <label>Genre<input id="f_genre_${id}" value="${esc(book.genre)}"></label>
      </div>
      <div class="two">
        <label>Publisher<input id="f_pub_${id}" value="${esc(book.publisher)}"></label>
        <label>Published<input id="f_date_${id}" value="${esc(book.published_date)}"></label>
      </div>
      <label>Description<textarea id="f_desc_${id}" rows="3">${esc(book.description)}</textarea></label>
      <button class="btn btn-primary block" onclick="saveCard(${id}, this)">💾 Save changes</button>`;
    document.getElementById('list').prepend(li);
  }
  window.saveCard = async (id, btn) => {
    const val = s => { const el = document.getElementById(s); return el ? el.value.trim() : ''; };
    const b = Object.assign({}, _cards[id], {
      title: val('f_title_' + id), author: val('f_author_' + id),
      publisher: val('f_pub_' + id), published_date: val('f_date_' + id),
      description: val('f_desc_' + id), genre: val('f_genre_' + id),
      page_count: parseInt(val('f_pages_' + id), 10) || null
    });
    _cards[id] = b;
    btn.disabled = true; const prev = btn.textContent; btn.textContent = 'Saving…';
    const ok = await saveRow(b);
    const tag = document.getElementById('tag' + id); if (tag){ tag.textContent = ok ? 'Saved ✓' : 'Save failed'; tag.className = 'tag' + (ok ? '' : ' warn'); }
    btn.disabled = false; btn.textContent = ok ? '✓ Saved' : 'Retry save';
    setTimeout(() => { if (btn.textContent === '✓ Saved') btn.textContent = prev; }, 1500);
    toast(ok ? 'Updated ✓' : 'Save failed');
  };
  function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function handleISBN(raw){
    const isbn = isbn13(raw);
    if (isbn.length < 10){ toast('That doesn’t look like an ISBN'); return; }
    const now = Date.now();
    if (recent.get(isbn) && now - recent.get(isbn) < 4000) return;  // ignore the same barcode held in frame
    recent.set(isbn, now);
    if (saved.has(isbn)){ toast('Already scanned ✓'); return; }
    buzz();
    toast('Looking up…');
    const book = await lookup(isbn);
    const ok = await saveRow(book);
    if (ok){
      saved.add(isbn); count++; document.getElementById('count').textContent = count;
      addCard(book, true);
      toast(book.title ? `Saved: ${book.title}` : 'Saved ISBN');
    } else {
      addCard(book, false);
      toast(client ? 'Save failed — check the books table' : 'Cloud unavailable');
    }
  }

  function addManual(){
    const el = document.getElementById('manual');
    const v = el.value.trim();
    if (!v) return;
    el.value = '';
    handleISBN(v);
  }
  document.getElementById('manual').addEventListener('keydown', e => { if (e.key === 'Enter') addManual(); });

  // ── Camera scanning: native BarcodeDetector, with ZXing fallback ─────────────
  let stream = null, nativeTimer = null, zx = null, scanning = false;
  const camBtn = document.getElementById('camBtn');
  const stage = document.getElementById('stage');
  const video = document.getElementById('video');

  camBtn.addEventListener('click', () => { scanning ? stopCam() : startCam(); });

  async function startCam(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast('No camera — type the ISBN instead'); return;
    }
    scanning = true; camBtn.textContent = '■ Stop camera'; camBtn.className = 'btn btn-secondary block'; stage.classList.add('live');
    if ('BarcodeDetector' in window){
      try{
        stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } });
        video.srcObject = stream; await video.play();
        const det = new BarcodeDetector({ formats:['ean_13','ean_8','isbn'] });
        nativeTimer = setInterval(async () => {
          try{ const codes = await det.detect(video); if (codes && codes.length) handleISBN(codes[0].rawValue); }catch(e){}
        }, 450);
      }catch(e){ scanning = false; resetCamUI(); toast('Camera blocked — allow access or type the ISBN'); }
    } else {
      // iOS Safari etc. — lazy-load ZXing and decode from the video device
      try{ await ensureZXing(); }
      catch(e){ scanning = false; resetCamUI(); toast('Camera scan not supported here — type the ISBN'); return; }
      try{
        zx = new ZXing.BrowserMultiFormatReader();
        zx.decodeFromVideoDevice(undefined, video, (result) => { if (result) handleISBN(result.getText()); });
      }catch(e){ scanning = false; resetCamUI(); toast('Couldn’t start camera — type the ISBN'); }
    }
  }

  function stopCam(){
    scanning = false;
    if (nativeTimer){ clearInterval(nativeTimer); nativeTimer = null; }
    if (zx){ try{ zx.reset(); }catch(e){} zx = null; }
    if (stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null; resetCamUI();
  }
  function resetCamUI(){ camBtn.textContent = '📷 Start camera'; camBtn.className = 'btn btn-primary block'; stage.classList.remove('live'); }

  function ensureZXing(){
    return new Promise((resolve, reject) => {
      if (window.ZXing && window.ZXing.BrowserMultiFormatReader) return resolve();
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js';
      s.onload = () => (window.ZXing && window.ZXing.BrowserMultiFormatReader) ? resolve() : reject();
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  window.addEventListener('pagehide', stopCam);
</script>
</body>
</html>
